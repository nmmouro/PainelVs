<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Painel Frota</title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="./assets/css/variables.css"
  >

  <link
    rel="stylesheet"
    href="./assets/css/layout.css"
  >

  <link
    rel="stylesheet"
    href="./assets/css/tables.css"
  >

  <link
    rel="stylesheet"
    href="./assets/css/status.css"
  >

</head>

<body>

  <!-- ================= HEADER ================= -->

  <header class="topbar">

    <div class="left">

      <img
        src="./assets/images/logo.png"
        class="logo"
        alt="Logo"
      >

    </div>

    <div class="center">

      <h1 class="title">
        MOVIMENTAÇÃO DIÁRIA
      </h1>

    </div>

    <div class="right">

      <div id="clock"></div>

      <div class="actions">

        <button id="toggle-audio">
          🔊 SOM ON
        </button>

        <button id="toggle-fullscreen">
          ⛶ TELA CHEIA
        </button>

      </div>

    </div>

  </header>

  <!-- ================= DASHBOARD ================= -->

  <main id="app">

    <!--
      Todo conteúdo será renderizado
      dinamicamente pelo app.js
    -->

  </main>

  <!-- ================= AUDIO ================= -->

  <audio
    id="beep"
    preload="auto"
  >
    <source
      src="./assets/audio/alerta.mp3"
      type="audio/mpeg"
    >
  </audio>

  <!-- ================= CONFIG ================= -->

  <script
    type="module"
    src="./js/config/sheets.js"
  ></script>

  <script
    type="module"
    src="./js/config/tabs.js"
  ></script>

  <script
    type="module"
    src="./js/config/status.js"
  ></script>

  <!-- ================= API ================= -->

  <script
    type="module"
    src="./js/api/sheetsApi.js"
  ></script>

  <!-- ================= SERVICES ================= -->

  <script
    type="module"
    src="./js/services/painelService.js"
  ></script>

  <script
    type="module"
    src="./js/services/agendaService.js"
  ></script>

  <script
    type="module"
    src="./js/services/veiculosService.js"
  ></script>

  <script
    type="module"
    src="./js/services/motoristasService.js"
  ></script>

  <!-- ================= COMPONENTS ================= -->

  <script
    type="module"
    src="./js/components/Table.js"
  ></script>

  <script
    type="module"
    src="./js/components/Card.js"
  ></script>

  <script
    type="module"
    src="./js/components/VeiculosTable.js"
  ></script>

  <script
    type="module"
    src="./js/components/MotoristasTable.js"
  ></script>

  <!-- ================= UTILS ================= -->

  <script
    type="module"
    src="./js/utils/date.js"
  ></script>

  <script
    type="module"
    src="./js/utils/helpers.js"
  ></script>

  <script
    type="module"
    src="./js/utils/status.js"
  ></script>

  <!-- ================= APP ================= -->

  <script
    type="module"
    src="./js/app.js"
  ></script>

</body>

</html>
